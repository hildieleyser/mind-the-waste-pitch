<title>Mind the Waste — Interactive Prototype</title>
<style>
  :root {
    --platform:#16171B; --platform2:#1E2026; --card:#212430; --cardAlt:#191B21;
    --enamel:#F3F1EC; --enamelDim:rgba(243,241,236,.66); --enamelFaint:rgba(243,241,236,.40);
    --hairline:rgba(243,241,236,.14);
    --red:#E01D1D; --navy:#1D3A8A; --yellow:#F4C21B; --green:#00843D; --blue:#0098D4; --expired:#6B6E76;
    --display:'Futura','Century Gothic','Trebuchet MS',system-ui,sans-serif;
    --mono:'SF Mono',ui-monospace,'Roboto Mono',Menlo,monospace;
    color-scheme:dark;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#0C0D10;font-family:var(--display);color:var(--enamel);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:20px;
    background-image:radial-gradient(120% 80% at 80% 0%,rgba(224,29,29,.14),transparent 55%);}

  .device{width:390px;max-width:100%;height:min(844px,94vh);background:var(--platform);
    border-radius:36px;overflow:hidden;display:flex;flex-direction:column;position:relative;
    box-shadow:0 40px 80px -30px rgba(0,0,0,.8),0 0 0 10px #0A0B0D,0 0 0 11px rgba(243,241,236,.06);}

  .hdr{background:var(--platform);padding:14px 18px 0;flex-shrink:0;}
  .hdr-row{display:flex;align-items:center;justify-content:space-between;height:40px;}
  .hdr-title{display:flex;align-items:center;gap:9px;}
  .hdr-title b{font-weight:600;text-transform:uppercase;letter-spacing:1.2px;font-size:15px;}
  .hdr-btn{width:34px;height:34px;display:grid;place-items:center;color:var(--enamel);cursor:pointer;border-radius:8px;font-size:19px;}
  .hdr-btn:hover{background:var(--platform2);}
  .stripe{height:4px;background:var(--yellow);margin-top:12px;border-radius:2px;}

  .scroll{flex:1;overflow-y:auto;padding:16px;scrollbar-width:none;}
  .scroll::-webkit-scrollbar{display:none;}

  .tabs{display:flex;background:var(--cardAlt);border-top:1px solid var(--hairline);flex-shrink:0;padding:8px 8px 22px;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;cursor:pointer;border-radius:10px;color:var(--enamelFaint);}
  .tab.on{color:var(--enamel);}
  .tab .ic{font-size:19px;}
  .tab .lb{font-size:9px;text-transform:uppercase;letter-spacing:.7px;font-weight:600;}
  .tab.on .dot{background:var(--yellow);}
  .tab .dot{width:16px;height:3px;border-radius:2px;background:transparent;}

  .card{background:var(--card);border:1px solid var(--hairline);border-radius:14px;padding:16px;position:relative;overflow:hidden;}
  .eyebrow{font-family:var(--mono);text-transform:uppercase;letter-spacing:2px;font-size:10px;color:var(--enamelDim);}
  h2.sec{font-weight:500;text-transform:uppercase;letter-spacing:1.4px;font-size:15px;margin:22px 0 12px;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .btn-y{background:var(--yellow);color:var(--platform);border:none;border-radius:30px;padding:12px;font-family:var(--display);font-weight:600;text-transform:uppercase;letter-spacing:1px;font-size:13px;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-y:active{transform:scale(.98);}
  .accent{position:absolute;left:0;top:0;bottom:0;width:5px;}

  .hero-top{display:flex;align-items:center;gap:14px;}
  .hero-name{font-weight:500;text-transform:uppercase;letter-spacing:1px;font-size:16px;}
  .status{display:flex;align-items:center;gap:6px;margin-top:4px;font-family:var(--mono);font-size:11px;color:var(--enamelDim);}
  .sdot{width:8px;height:8px;border-radius:50%;}
  .battery{display:flex;align-items:center;gap:4px;background:var(--platform2);padding:4px 8px;border-radius:20px;font-size:11px;font-weight:600;}
  .sensors{display:flex;margin-top:18px;background:var(--platform);border-radius:12px;padding:14px 0;}
  .sensor{flex:1;text-align:center;}
  .sensor .v{font-weight:700;font-size:22px;margin-top:2px;}
  .sensor .l{font-size:10px;color:var(--enamelDim);text-transform:uppercase;letter-spacing:1px;}
  .sensor .h{font-size:10px;color:var(--enamelFaint);}
  .sdiv{width:1px;background:var(--hairline);margin:4px 0;}

  .stats{display:flex;gap:10px;margin-top:16px;}
  .stat{flex:1;background:var(--card);border:1px solid var(--hairline);border-radius:12px;padding:14px 12px;position:relative;overflow:hidden;}
  .stat .v{font-weight:700;font-size:21px;}
  .stat .l{font-size:9px;color:var(--enamelDim);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

  .risk-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
  .risk-row::-webkit-scrollbar{display:none;}
  .risk{min-width:112px;background:var(--card);border:1px solid var(--hairline);border-radius:12px;padding:13px;cursor:pointer;}
  .linedot{width:12px;height:12px;border-radius:50%;border:3px solid var(--platform);margin-bottom:8px;}
  .risk .em{font-size:22px;}
  .risk .nm{font-size:12px;font-weight:600;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .risk .dy{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}
  .track{height:4px;border-radius:2px;background:var(--platform);margin-top:9px;overflow:hidden;}
  .fill{height:100%;border-radius:2px;}

  .actions{display:flex;flex-wrap:wrap;gap:10px;}
  .action{width:calc(50% - 5px);background:var(--card);border:1px solid var(--hairline);border-radius:12px;padding:15px;cursor:pointer;position:relative;overflow:hidden;}
  .action .ic{font-size:22px;}
  .action .t{font-weight:600;text-transform:uppercase;letter-spacing:.8px;font-size:14px;margin-top:8px;}
  .action .s{font-size:11px;color:var(--enamelDim);margin-top:2px;}

  .foot{text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--enamelFaint);text-transform:uppercase;margin:26px 0 6px;}

  .chips{display:flex;gap:8px;margin-bottom:14px;}
  .chip{padding:8px 14px;border-radius:30px;background:var(--card);border:1px solid var(--hairline);color:var(--enamelDim);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;cursor:pointer;}
  .chip.on{background:var(--yellow);border-color:var(--yellow);color:var(--platform);}
  .item{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--hairline);border-radius:12px;padding:12px;margin-bottom:10px;cursor:pointer;}
  .item .em{width:44px;height:44px;border-radius:10px;background:var(--platform);display:grid;place-items:center;font-size:22px;flex-shrink:0;}
  .item .nm{font-weight:700;font-size:15px;}
  .pill{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .item .mt{font-size:11px;color:var(--enamelDim);margin-top:2px;}
  .summary{display:flex;background:var(--card);border:1px solid var(--hairline);border-radius:14px;padding:14px 0;margin-bottom:16px;}
  .summary .c{flex:1;text-align:center;}
  .summary .v{font-weight:700;font-size:22px;}
  .summary .l{font-size:9px;color:var(--enamelDim);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

  .hero-save .v{font-weight:700;font-size:40px;line-height:1;}
  .hchips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .hchip{display:flex;align-items:center;gap:5px;background:var(--platform);border-radius:20px;padding:6px 11px;font-size:11px;font-weight:600;}
  .chart{display:flex;align-items:flex-end;justify-content:space-between;height:120px;gap:6px;}
  .bcol{flex:1;display:flex;flex-direction:column;align-items:center;}
  .btrack{width:22px;height:100px;border-radius:4px;background:var(--platform);display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;}
  .blab{font-size:10px;color:var(--enamelDim);margin-top:6px;}
  .legend{display:flex;gap:18px;justify-content:center;margin-top:12px;font-size:11px;color:var(--enamelDim);}
  .legdot{width:9px;height:9px;border-radius:3px;display:inline-block;margin-right:5px;}
  .breakdown{display:flex;gap:8px;}
  .bd{flex:1;background:var(--card);border:1px solid var(--hairline);border-radius:12px;padding:13px 8px;text-align:center;position:relative;overflow:hidden;}
  .bd .topline{position:absolute;left:0;right:0;top:0;height:4px;}
  .bd .ic{font-size:17px;}
  .bd .v{font-weight:700;font-size:20px;margin-top:6px;}
  .bd .l{font-size:9px;color:var(--enamelDim);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
  .act{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--hairline);border-radius:10px;padding:11px 12px;margin-bottom:8px;}
  .act .em{font-size:20px;}
  .act .nm{font-size:13px;font-weight:600;}
  .act .dt{font-size:10px;color:var(--enamelFaint);}
  .act .val{font-weight:700;font-size:13px;min-width:52px;text-align:right;}

  .src{display:flex;gap:8px;margin-bottom:14px;}
  .src .c{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px;border-radius:30px;background:var(--card);border:1px solid var(--hairline);color:var(--enamelDim);font-size:11px;font-weight:600;cursor:pointer;}
  .src .c.on{background:var(--enamel);color:var(--platform);border-color:var(--enamel);}
  .gval{font-weight:700;font-size:46px;line-height:.9;}
  .gunit{font-size:12px;color:var(--enamelDim);}
  .zone{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;}
  .spark{display:flex;align-items:flex-end;gap:3px;height:64px;margin-top:18px;}
  .spark div{flex:1;border-radius:2px;min-height:5px;}
  .gstats{display:flex;margin-top:16px;}
  .gstats .c{flex:1;text-align:center;}
  .gstats .v{font-weight:700;font-size:17px;}
  .gstats .l{font-size:9px;color:var(--enamelDim);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
  .gstats .d{width:1px;height:28px;background:var(--hairline);align-self:center;}
  .mood{display:flex;gap:12px;}
  .mc{flex:1;background:var(--card);border:1px solid var(--hairline);border-radius:12px;padding:14px;}
  .mc .hd{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--enamelDim);}
  .mdots{display:flex;gap:5px;margin-top:10px;}
  .mdots div{flex:1;height:8px;border-radius:4px;}
  .mc .val{font-size:11px;color:var(--enamelDim);margin-top:8px;}
  .checkin{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--hairline);border-radius:12px;padding:12px;margin-top:12px;}
  .checkin .btns{display:flex;gap:8px;}
  .cbtn{width:40px;height:40px;border-radius:10px;background:var(--platform);border:none;font-size:20px;cursor:pointer;}
  .cbtn:active{transform:scale(.94);}
  .rec .t{font-weight:500;text-transform:uppercase;letter-spacing:1px;font-size:16px;}
  .rec .b{font-size:13px;color:var(--enamelDim);margin-top:4px;line-height:1.4;}
  .ritem{display:flex;align-items:center;gap:12px;background:var(--platform);border-radius:10px;padding:11px;margin-top:8px;}
  .ritem .nm{flex:1;font-size:13px;font-weight:600;}
  .rtag{background:rgba(0,132,61,.2);color:#37B06B;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;}
  .ruse{font-size:10px;color:var(--red);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .disclaimer{display:flex;gap:6px;margin-top:16px;font-size:10px;color:var(--enamelFaint);line-height:1.4;}

  .toast{position:absolute;left:16px;right:16px;bottom:90px;background:var(--enamel);color:var(--platform);border-radius:12px;padding:13px 16px;font-size:13px;font-weight:600;opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none;z-index:20;box-shadow:0 10px 30px rgba(0,0,0,.4);}
  .toast.show{opacity:1;transform:translateY(0);}
  .sheet-bg{position:absolute;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.2s;z-index:30;}
  .sheet-bg.show{opacity:1;pointer-events:auto;}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:var(--platform2);border-radius:20px 20px 0 0;padding:20px 16px 26px;transform:translateY(100%);transition:.28s cubic-bezier(.2,.8,.2,1);z-index:31;border-top:1px solid var(--hairline);max-height:84%;overflow-y:auto;scrollbar-width:none;}
  .sheet::-webkit-scrollbar{display:none;}
  .meal-h{display:flex;align-items:flex-start;gap:12px;margin-bottom:6px;}
  .meal-h .rd{flex-shrink:0;margin-top:2px;}
  .meal-title{font-family:var(--display);font-weight:500;text-transform:uppercase;letter-spacing:1px;font-size:19px;line-height:1.1;}
  .meal-sub{font-size:12px;color:var(--enamelDim);margin-top:4px;line-height:1.4;}
  .meal-meta{display:flex;gap:8px;margin:14px 0;}
  .meal-meta .m{flex:1;background:var(--card);border:1px solid var(--hairline);border-radius:10px;padding:10px;text-align:center;}
  .meal-meta .m .v{font-weight:600;font-size:16px;}
  .meal-meta .m .l{font-size:9px;color:var(--enamelDim);text-transform:uppercase;letter-spacing:.6px;margin-top:2px;}
  .meal-sec{font-family:var(--mono);text-transform:uppercase;letter-spacing:1.5px;font-size:10px;color:var(--enamelDim);margin:14px 0 8px;}
  .ing{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--hairline);}
  .ing .em{font-size:18px;}
  .ing .nm{flex:1;font-size:14px;}
  .ing .q{font-size:11px;color:var(--enamelDim);}
  .ing .rescue{font-size:9px;color:var(--red);text-transform:uppercase;letter-spacing:.5px;font-weight:600;background:rgba(224,29,29,.14);padding:2px 6px;border-radius:10px;}
  .step{display:flex;gap:12px;margin-bottom:12px;}
  .step .n{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--yellow);color:var(--platform);display:grid;place-items:center;font-weight:600;font-size:12px;}
  .step .tx{flex:1;font-size:13px;line-height:1.45;color:var(--enamel);padding-top:2px;}
  .meal-note{display:flex;gap:8px;background:rgba(0,132,61,.12);border-radius:10px;padding:11px 12px;margin:6px 0 16px;font-size:12px;color:#8fdcae;line-height:1.4;}
  .sheet.show{transform:translateY(0);}
  .sheet h3{font-weight:600;text-transform:uppercase;letter-spacing:.8px;font-size:16px;margin-bottom:4px;}
  .sheet p{font-size:12px;color:var(--enamelDim);margin-bottom:14px;}
  .sheet button{width:100%;padding:14px;border-radius:12px;border:1px solid var(--hairline);background:var(--card);color:var(--enamel);font-family:var(--display);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px;text-align:left;display:flex;align-items:center;gap:10px;}
  .sheet button:active{background:var(--platform);}
  .sheet .bin{color:#ff8a8a;}
  .sheet .cancel{text-align:center;justify-content:center;color:var(--enamelDim);}
</style>

<div class="device">
  <div class="hdr">
    <div class="hdr-row">
      <div class="hdr-btn" id="menuBtn">&#9776;</div>
      <div class="hdr-title"><span id="hdrRoundel"></span><b id="hdrTitle">Mind the Waste</b></div>
      <div class="hdr-btn" id="rightBtn">&#9881;</div>
    </div>
    <div class="stripe"></div>
  </div>
  <div class="scroll" id="screen"></div>
  <div class="tabs" id="tabs"></div>
  <div class="toast" id="toast"></div>
  <div class="sheet-bg" id="sheetBg"></div>
  <div class="sheet" id="sheet"></div>
</div>

function statusOf(f){return f>=70?'fresh':f>=45?'use-soon':f>0?'expiring':'expired';}
var statusColor={fresh:C.green,'use-soon':C.yellow,expiring:C.red,expired:C.expired};
var statusLabel={fresh:'Fresh','use-soon':'Use soon',expiring:'Expiring',expired:'Expired'};
function atRisk(){return S.items.filter(function(i){return i.fresh<50||i.best<=1;}).sort(function(a,b){return a.fresh-b.fresh;});}
function valueSaved(){return S.waste.filter(function(e){return e.action!=='wasted';}).reduce(function(s,e){return s+e.val;},0);}
function valueWasted(){return S.waste.filter(function(e){return e.action==='wasted';}).reduce(function(s,e){return s+e.val;},0);}
function co2Saved(){return S.waste.filter(function(e){return e.action!=='wasted';}).reduce(function(s,e){return s+e.co2;},0);}
function diversion(){return S.waste.length?Math.round(S.waste.filter(function(e){return e.action!=='wasted';}).length/S.waste.length*100):0;}
function daysLabel(d){return d<=0?'Today':d===1?'1 day':d+' days';}

function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2200);}

}

  var F=[['risk','Use soon'],['all','All items'],['fresh','Fresh']];

  var chips='';
  F.forEach(function(f){chips+='<div class="chip '+(S.filter===f[0]?'on':'')+'" data-filter="'+f[0]+'">'+f[1]+'</div>';});

  var items='';
  list.forEach(function(i){
    var st=statusOf(i.fresh),c=statusColor[st];
    var left=i.best<=0?'use today':i.best===1?'1 day left':i.best+' days left';
    items+='<div class="item" data-item="'+i.id+'">'+pic(i.name,i.em,44)+'<div style="flex:1">'
      +'<div class="row"><span class="nm">'+i.name+'</span><span class="pill" style="background:'+c+'26;color:'+c+'">'+statusLabel[st]+'</span></div>'
      +'<div class="mt">'+i.qty+' · '+i.cat+' · '+left+'</div>'
      +'<div class="track"><div class="fill" style="width:'+i.fresh+'%;background:'+c+'"></div></div></div>'
      +'<span style="color:var(--enamelFaint)">⋮</span></div>';
  });
  if(!items)items='<div class="card" style="text-align:center;color:var(--enamelDim)">Nothing here. Scan your shelf.</div>';
  var plan=list.length?'<button class="btn-y" style="margin-top:6px;background:var(--card);color:var(--enamel);border:1px solid var(--hairline)" data-meal="1">Plan meals around what is at risk</button>':'';

  return '<div class="summary">'
    +'<div class="c"><div class="v">'+S.items.length+'</div><div class="l">tracked</div></div>'
    +'<div class="c"><div class="v" style="color:'+C.red+'">'+riskCount+'</div><div class="l">need using</div></div>'
    +'<div class="c"><div class="v" style="color:'+C.yellow+'">£'+atRiskVal.toFixed(0)+'</div><div class="l">at risk</div></div>'
    +'</div><div class="chips">'+chips+'</div>'+items+plan;
}

/* ---------- INSIGHTS ---------- */
function insights(){
  var DAYS=['M','T','W','T','F','S','S'];
  var week=DAYS.map(function(){return {s:0,w:0};});
  S.waste.forEach(function(e){var idx=6-e.d;if(idx>=0&&idx<7){if(e.action==='wasted')week[idx].w+=e.val;else week[idx].s+=e.val;}});
  var maxB=1;week.forEach(function(d){maxB=Math.max(maxB,d.s+d.w);});
  var meta={used:['Eaten','🍽',C.green],frozen:['Frozen','❄',C.blue],shared:['Shared','🎁',C.red],wasted:['Binned','🗑',C.expired]};
  var counts={used:0,frozen:0,shared:0,wasted:0};S.waste.forEach(function(e){counts[e.action]++;});

  var bars='';
  week.forEach(function(d,i){
    var wBar=d.w>0?'<div style="height:'+(d.w/maxB*100)+'%;background:rgba(224,29,29,.5);border-radius:3px 3px 0 0"></div>':'';
    var sRad=d.w>0?'0':'3px 3px 0 0';
    bars+='<div class="bcol"><div class="btrack">'+wBar+'<div style="height:'+(d.s/maxB*100)+'%;background:'+C.green+';border-radius:'+sRad+'"></div></div><div class="blab">'+DAYS[i]+'</div></div>';
  });

  var breakdown='';
  ['used','frozen','shared','wasted'].forEach(function(k){var m=meta[k];
    breakdown+='<div class="bd"><div class="topline" style="background:'+m[2]+'"></div><div class="ic">'+m[1]+'</div><div class="v">'+counts[k]+'</div><div class="l">'+m[0]+'</div></div>';
  });

  var acts='';
  S.waste.slice(0,8).forEach(function(e){var m=meta[e.action];
    var val=(e.action==='wasted'?'-':'+')+'£'+e.val.toFixed(2);
    acts+='<div class="act">'+pic(e.name,e.em,32)+'<div style="flex:1"><div class="nm">'+e.name+'</div><div class="dt">'+(e.d===0?'today':e.d+'d ago')+'</div></div>'
      +'<span class="pill" style="background:'+m[2]+'26;color:'+m[2]+'">'+m[0]+'</span>'
      +'<span class="val" style="color:'+(e.action==='wasted'?'var(--enamelFaint)':C.green)+'">'+val+'</span></div>';
  });

  return '<div class="card hero-save"><div class="accent" style="background:'+C.yellow+'"></div>'
    +'<div class="eyebrow">Total saved</div><div class="v">£'+valueSaved().toFixed(2)+'</div>'
    +'<div class="hchips"><div class="hchip">🌿 '+co2Saved().toFixed(1)+'kg CO₂e</div><div class="hchip">✅ '+diversion()+'% rescued</div><div class="hchip">🥗 '+(counts.used+counts.frozen+counts.shared)+' items</div></div></div>'
    +'<h2 class="sec">This week</h2><div class="card"><div class="chart">'+bars+'</div>'
    +'<div class="legend"><span><span class="legdot" style="background:'+C.green+'"></span>Rescued</span><span><span class="legdot" style="background:rgba(224,29,29,.5)"></span>Wasted</span></div></div>'
    +'<h2 class="sec">Where your food goes</h2><div class="breakdown">'+breakdown+'</div>'
    +'<h2 class="sec">Recent activity</h2>'+acts;
}

/* ---------- BALANCE ---------- */
function glucoseZone(v){return v<70?['Low',C.blue]:v<=140?['In range',C.green]:v<=180?['Elevated',C.yellow]:['High',C.red];}
function balance(){
  var g=S.glucose,cur=g[g.length-1],z=glucoseZone(cur);
  var min=Math.min.apply(null,g.concat(70)),max=Math.max.apply(null,g.concat(160));
  var avg=Math.round(g.reduce(function(a,b){return a+b;},0)/g.length);
  var tir=Math.round(g.filter(function(v){return v>=70&&v<=140;}).length/g.length*100);
  var trend=g[g.length-1]-g[g.length-2];
  var SRC=[['health','Apple Health','❤️'],['dexcom','Dexcom','📡'],['libre','FreeStyle Libre','📶']];
  var atr=S.items.filter(function(i){return i.fresh<55||i.best<=2;}).sort(function(a,b){return a.fresh-b.fresh;});
  var steady=atr.filter(function(i){return i.gi==='low';});
  var prot=S.items.filter(function(i){return i.cat==='Protein';})[0];
  var picks=steady.slice(0,2);
  if(prot&&!picks.filter(function(p){return p.id===prot.id;}).length)picks.push(prot);
  picks=picks.slice(0,3);
  var high=cur>140;
  var title=high?'Steady the spike':cur<75?'Bring it up gently':'Keep it steady';
  var body=high?'Your glucose is above range. A high-fibre, high-protein plate blunts the curve better than carbs alone.'
    :cur<75?'Running low. Pair a little fruit with protein or dairy so it lifts without a crash.'
    :'You are in range. A protein-forward plate from what needs using keeps you level and cuts waste.';

  var src='';
  SRC.forEach(function(s){src+='<div class="c '+(S.source===s[0]?'on':'')+'" data-src="'+s[0]+'">'+s[2]+' '+s[1]+'</div>';});
  var spark='';
  g.forEach(function(v){var zc=glucoseZone(v)[1];var h=8+(v-min)/Math.max(1,max-min)*54;spark+='<div style="height:'+h+'px;background:'+zc+'"></div>';});
  var moodDots='';for(var n=1;n<=5;n++)moodDots+='<div style="background:'+(n<=S.mood?C.green:'var(--platform)')+'"></div>';
  var stressDots='';for(var n2=1;n2<=5;n2++)stressDots+='<div style="background:'+(n2<=S.stress?C.yellow:'var(--platform)')+'"></div>';
  var moodTxt=['','Low','Flat','Okay','Good','Great'][S.mood];
  var stressTxt=['','Very calm','Calm','Okay','Tense','High'][S.stress];

  var recItems='';
  picks.forEach(function(i){var tag=i.gi==='low'?'steady':i.cat==='Protein'?'protein':'balance';
    recItems+='<div class="ritem">'+pic(i.name,i.em,34)+'<span class="nm">'+i.name+'</span><span class="rtag">'+tag+'</span><span class="ruse">use soon</span></div>';});
  if(!recItems)recItems='<div class="b" style="margin-top:12px">Scan your shelf to get a tailored plate.</div>';

  var trendArrow=trend>2?'↑':trend<-2?'↓':'→';

  return '<div class="src">'+src+'</div>'
    +'<div class="card"><div class="row" style="align-items:flex-start">'
    +'<div><div class="gval">'+cur+'</div><div class="gunit">mg/dL</div></div>'
    +'<div style="text-align:right"><span class="zone" style="background:'+z[1]+'2b;color:'+z[1]+'">'+z[0]+'</span>'
    +'<div style="font-size:11px;color:var(--enamelDim);margin-top:6px">'+trendArrow+' '+(trend>0?'+':'')+trend+' since last read</div></div></div>'
    +'<div class="spark">'+spark+'</div>'
    +'<div class="gstats"><div class="c"><div class="v">'+avg+'</div><div class="l">avg mg/dL</div></div><div class="d"></div>'
    +'<div class="c"><div class="v" style="color:'+C.green+'">'+tir+'%</div><div class="l">time in range</div></div><div class="d"></div>'
    +'<div class="c"><div class="v" style="color:'+C.green+'">Live</div><div class="l">CGM sync</div></div></div></div>'
    +'<h2 class="sec">How you feel</h2><div class="mood">'
    +'<div class="mc"><div class="hd">Mood</div><div class="mdots">'+moodDots+'</div><div class="val">'+moodTxt+'</div></div>'
    +'<div class="mc"><div class="hd">Stress</div><div class="mdots">'+stressDots+'</div><div class="val">'+stressTxt+'</div></div></div>'
    +'<div class="checkin"><span style="font-size:13px;font-weight:600;color:var(--enamelDim)">Quick check-in</span>'
    +'<div class="btns"><button class="cbtn" data-mood="5,2">😌</button><button class="cbtn" data-mood="3,3">😐</button><button class="cbtn" data-mood="2,5">😣</button></div></div>'
    +'<h2 class="sec">Balance from your fridge</h2>'
    +'<div class="card rec"><div class="accent" style="background:'+C.yellow+'"></div>'
    +'<div style="display:flex;gap:12px"><div style="width:40px;height:40px;border-radius:10px;background:rgba(224,29,29,.14);display:grid;place-items:center;flex-shrink:0">✨</div>'
    +'<div><div class="t">'+title+'</div><div class="b">'+body+'</div></div></div>'+recItems
    +'<button class="btn-y" style="margin-top:14px" data-meal="1">Build this into a meal</button></div>'
    +'<div class="disclaimer">Guidance for general wellbeing, not medical advice. Follow your clinician for diabetes management.</div>';
}

/* ---------- render + events ---------- */
function render(){
  document.getElementById('hdrTitle').textContent=TITLES[S.tab];
  var el=document.getElementById('screen');
  el.innerHTML = S.tab==='hub'?hub():S.tab==='fridge'?fridge():S.tab==='insights'?insights():balance();
  el.scrollTop=0;
  renderTabs();
  wire();
}
function wire(){
  var i,arr;
  arr=document.querySelectorAll('[data-tab]');for(i=0;i<arr.length;i++)arr[i].onclick=function(){S.tab=this.getAttribute('data-tab');render();};
  arr=document.querySelectorAll('[data-filter]');for(i=0;i<arr.length;i++)arr[i].onclick=function(){S.filter=this.getAttribute('data-filter');render();};
  arr=document.querySelectorAll('[data-src]');for(i=0;i<arr.length;i++)arr[i].onclick=function(){S.source=this.getAttribute('data-src');toast(this.textContent.trim()+' linked. Syncing every 5 min.');render();};
  arr=document.querySelectorAll('[data-mood]');for(i=0;i<arr.length;i++)arr[i].onclick=function(){var p=this.getAttribute('data-mood').split(',');S.mood=+p[0];S.stress=+p[1];render();};
  arr=document.querySelectorAll('[data-item]');for(i=0;i<arr.length;i++)arr[i].onclick=function(){openSheet(+this.getAttribute('data-item'));};
  arr=document.querySelectorAll('[data-meal]');for(i=0;i<arr.length;i++)arr[i].onclick=showMeal;
  var cb=document.getElementById('connectBtn');if(cb)cb.onclick=toggleConnect;
  var sb=document.getElementById('scanBtn');if(sb)sb.onclick=scanShelf;
}
function toggleConnect(){
  if(S.device.connected){S.device.connected=false;clearInterval(S.simTimer);S.simTimer=null;}
  else{S.device.connected=true;runSim();toast('Demo Mode on. Live telemetry streaming.');}
  render();
}
function runSim(){
  clearInterval(S.simTimer);
  S.simTimer=setInterval(function(){
    S.simTick++;var open=S.simTick%9===0;var drift=Math.sin(S.simTick/5)*.5;
    S.sensor.tempC=+(4.0+drift+(open?2.4:0)).toFixed(1);
    S.sensor.humidity=Math.round(57+Math.cos(S.simTick/6)*5+(open?8:0));
    S.sensor.doorOpen=open;
    if(S.tab==='hub')render();
  },2500);
}
function scanShelf(){
  var n=3+Math.floor(Math.random()*2);
  var shuffled=POOL.slice().sort(function(){return Math.random()-.5;}).slice(0,n);
  shuffled.forEach(function(p){var it={id:S.nextId++,name:p.name,em:p.em,cat:p.cat,qty:p.qty,best:p.best,fresh:p.fresh,gi:p.gi};S.items.unshift(it);});
  toast('Shelf scanned. Detected '+n+' items from the magnet camera.');
  S.tab='fridge';render();
}
var CATVAL={Protein:4,Dairy:1.6,Fruit:2.2,Veg:1.4,Bakery:1.2,Dips:1.5};
var CATCO2={Protein:1.6,Dairy:.7,Fruit:.5,Veg:.4,Bakery:.4,Dips:.5};
function openSheet(id){
  var it=null;S.items.forEach(function(i){if(i.id===id)it=i;});if(!it)return;
  var sheet=document.getElementById('sheet'),bg=document.getElementById('sheetBg');
  sheet.innerHTML='<h3>'+it.name+'</h3><p>What happened to this?</p>'
    +'<button data-do="used">Cooked / eaten</button>'
    +'<button data-do="frozen">Frozen for later</button>'
    +'<button data-do="shared">Shared / given away</button>'
    +'<button class="bin" data-do="wasted">Binned</button>'
    +'<button class="cancel" data-do="cancel">Cancel</button>';
  bg.classList.add('show');sheet.classList.add('show');
  var close=function(){bg.classList.remove('show');sheet.classList.remove('show');};
  bg.onclick=close;
  var btns=sheet.querySelectorAll('[data-do]');
  for(var k=0;k<btns.length;k++)btns[k].onclick=function(){var a=this.getAttribute('data-do');close();if(a==='cancel')return;resolveItem(it,a);};
}
function resolveItem(it,action){
  S.items=S.items.filter(function(i){return i.id!==it.id;});
  S.waste.unshift({name:it.name,em:it.em,action:action,val:CATVAL[it.cat]||1.5,co2:CATCO2[it.cat]||.5,d:0});
  toast(action==='wasted'?(it.name+' binned. Logged to help you buy less.'):(it.name+' '+(action==='used'?'used':action)+'. That counts as rescued.'));
  render();
}
/* ---------- MEAL BUILDER (computed from fridge state) ---------- */
function buildMeal(){
  var atr=S.items.filter(function(i){return i.fresh<55||i.best<=2;}).sort(function(a,b){return a.fresh-b.fresh;});
  function firstCat(cat,pool){var r=null;(pool||S.items).forEach(function(i){if(!r&&i.cat===cat)r=i;});return r;}
  var protein=firstCat('Protein',atr)||firstCat('Protein');
  var veg=firstCat('Veg',atr)||firstCat('Veg');
  var used={},picks=[];
  [protein,veg].forEach(function(i){if(i&&!used[i.id]){picks.push(i);used[i.id]=1;}});
  atr.forEach(function(i){if(picks.length<4&&!used[i.id]){picks.push(i);used[i.id]=1;}});
  if(!picks.length)return null;
  var method=protein&&veg?'Skillet':veg?'Traybake':'Bowl';
  var primary=protein||picks[0];
  var secondary=veg||picks[1]||picks[0];
  var secName=(secondary&&secondary.id!==primary.id)?secondary.name:'Greens';
  var name=primary.name+' & '+secName+' '+method;
  var value=picks.reduce(function(s,i){return s+(CATVAL[i.cat]||1.5);},0);
  var kcal=180+picks.length*95+(protein?150:0);
  var time=12+picks.length*4;
  var pn=primary.name.toLowerCase();
  var sn=secName.toLowerCase();
  var extra=picks.filter(function(i){return i.id!==primary.id&&(!secondary||i.id!==secondary.id);});
  var extraNames=extra.map(function(i){return i.name.toLowerCase();}).join(' and ');
  var steps=[
    'Prep first: chop the '+sn+(extraNames?' and '+extraNames:'')+', and pat the '+pn+' dry.',
    protein?('Sear the '+pn+' in a hot pan for 4 to 5 minutes until golden, then set aside.'):'Warm a pan with a little oil over medium heat.',
    'Add the '+sn+(extraNames?', '+extraNames:'')+' and cook 3 to 4 minutes so they keep some bite.',
    'Return everything to the pan, season, and finish with a squeeze of lemon or a spoon of yoghurt.'
  ];
  return {name:name,picks:picks,value:value,kcal:kcal,time:time,steps:steps,count:picks.length};
}
function hideSheet(){document.getElementById('sheetBg').classList.remove('show');document.getElementById('sheet').classList.remove('show');}
function resolveSilent(it,action){
  S.items=S.items.filter(function(i){return i.id!==it.id;});
  S.waste.unshift({name:it.name,em:it.em,action:action,val:CATVAL[it.cat]||1.5,co2:CATCO2[it.cat]||.5,d:0});
}
function showMeal(){
  var meal=buildMeal();
  var sheet=document.getElementById('sheet'),bg=document.getElementById('sheetBg');
  if(!meal){
    sheet.innerHTML='<h3>No meal yet</h3><p>Scan your shelf so there is something to cook.</p><button class="cancel" id="mealClose">Close</button>';
  }else{
    var ings='';
    meal.picks.forEach(function(i){
      var risk=(i.fresh<50||i.best<=1)?'<span class="rescue">use soon</span>':'';
      ings+='<div class="ing">'+pic(i.name,i.em,32)+'<span class="nm">'+i.name+'</span><span class="q">'+i.qty+'</span>'+risk+'</div>';
    });
    var steps='';
    meal.steps.forEach(function(t,n){steps+='<div class="step"><div class="n">'+(n+1)+'</div><div class="tx">'+t+'</div></div>';});
    sheet.innerHTML=''
      +'<div class="meal-h"><span class="rd">'+roundel(30)+'</span><div><div class="meal-title">'+meal.name+'</div>'
      +'<div class="meal-sub">Built from '+meal.count+' item'+(meal.count>1?'s':'')+' that need using.</div></div></div>'
      +'<div class="meal-meta"><div class="m"><div class="v">'+meal.time+' min</div><div class="l">Prep</div></div>'
      +'<div class="m"><div class="v">~'+meal.kcal+'</div><div class="l">kcal</div></div>'
      +'<div class="m"><div class="v" style="color:'+C.green+'">£'+meal.value.toFixed(2)+'</div><div class="l">Rescued</div></div></div>'
      +'<div class="meal-note">Protein and slow carbs first, so this plate lifts blood sugar gently instead of spiking it.</div>'
      +'<div class="meal-sec">From your fridge</div>'+ings
      +'<div class="meal-sec">Method</div>'+steps
      +'<button class="btn-y" id="mealCook">Cook it &amp; mark items used</button>'
      +'<button class="cancel" id="mealClose" style="margin-top:8px">Close</button>';
  }
  bg.classList.add('show');sheet.classList.add('show');sheet.scrollTop=0;
  bg.onclick=hideSheet;
  var mc=document.getElementById('mealClose');if(mc)mc.onclick=hideSheet;
  var cook=document.getElementById('mealCook');if(cook)cook.onclick=function(){
    var m=buildMeal();hideSheet();
    if(m){m.picks.forEach(function(i){resolveSilent(i,'used');});render();toast(m.count+' items cooked and marked used. Nice one.');}
  };
}

document.getElementById('menuBtn').onclick=function(){toast('Side menu → Mind the Waste section');};
document.getElementById('rightBtn').onclick=function(){toast('Settings');};
render();
</script>
